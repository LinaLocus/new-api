name: Build my image (ghcr)

# 自建镜像流水线：构建并推送到 ghcr.io/linalocus/new-api
# 用 GitHub 内置 GITHUB_TOKEN 登录，无需配置任何 secret。
# 触发方式：在 GitHub 仓库 Actions 页面手动点 "Run workflow"。

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像版本标签（例如 v1.0.0 或 custom-1）'
        required: true
        default: 'custom-1'
        type: string

jobs:
  build:
    name: Build & push (amd64)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Write VERSION
        run: echo "${{ github.event.inputs.tag }}" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/linalocus/new-api:${{ github.event.inputs.tag }}
            ghcr.io/linalocus/new-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 镜像已推送" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/linalocus/new-api:${{ github.event.inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/linalocus/new-api:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
